<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Third by Thierry Lavallée</title>
    <link rel="stylesheet" href="./css/main.min.css">
</head>

<body class="d-flex flex-column h-100 bg-secondary">
    <header class="p-3 bg-black text-white">
        <div class="container-fluid">
            <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                <li>First</li>
                <li>Second</li>
            </ul>
        </div>
    </header>
    <main class="h-100">
        <section class="h-100">
            <div class="container-xl h-100">
                <div class="row h-100">
                    <div class="d-flex align-content-center justify-content-center">
                        <div class="thirdLogo">
                            <img src="./SVG/Third_Picto_40.svg" class="thirdPicto">
                            <div class="thirdLogoText text-light">
                                <div class="thirdLogoTextBrand">Third</div>
                                <div class="thirdLogoTextBase">
                                    by
                                    <span class="thirdLogoTextBaseHL">Thierry Lavallée</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>


    <footer class="bg-black footer mt-auto py-md-3 py-sm-2 fw-lighter">
        <div class="container-fluid">
            <div class="row">
                <div class="col text-light">
                    <div class="thirdFooterCol d-flex justify-content-evenly flex-wrap align-content-center">
                        <div class="thirdFooterCell">
                            <a title="Twitter" href="https://twitter.com/LavalleeThierry?ref_src=twsrc%5Etfw"
                                data-show-count="false" target="_blank">
                                <div class="thirdFooterText">twitter</div>
                            </a>
                            <div class="thirdFooterLine"></div>
                            <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
                        </div>
                        <div class="thirdFooterCell">
                            <a title="LinkedIn" href="https://www.linkedin.com/in/thierrylavallee/" target="_blank">
                                <div class="thirdFooterText">linkedin</div>
                            </a>
                            <div class="thirdFooterLine"></div>
                        </div>
                        <div class="thirdFooterCell">
                            <a title="GitHub" href="https://github.com/thierrylavallee" target="_blank">
                                <div class="thirdFooterText">github</div>
                            </a>
                            <div class="thirdFooterLine"></div>
                        </div>
                        <div class="thirdFooterCell">
                            <div class="thirdFooterText">©&nbsp;<span class="thirdCopyYear"></span>&nbsp;third</div>
                            <div class="thirdFooterLine"></div>
                        </div>
                        <div class="thirdFooterCell">
                            <div class="thirdFooterText">thierrylavallee.github.io</div>
                            <div class="thirdFooterLine"></div>
                        </div>
                        <div class="thirdFooterCell">
                            <div class="thirdFooterLine"></div>
                            <div class="thirdFooterText">all rights reserved</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    <script type="text/javascript" src="js/jquery.min.js"></script>
    <script type="text/javascript" src="js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="js/parallax.min.js"></script>
    <script type="text/javascript" src="js/main.js"></script>
</body>

</html>
